<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popa - Naročilo</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="#"><img src="img/popa.png" alt="Popa"></a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Domov</a></li>
                    <li class="nav-item"><a class="nav-link" href="O_nas.html">O nas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Izdelki</a></li>
                    <li class="nav-item"><a class="nav-link" href="Kontakt.html">Kontakt</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Narocilo.html">Naročilo</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <h1 class="fw-bold">Naročilo</h1>
        <hr class="mb-3" style="opacity: 0.1;">
        <p class="mb-4 text-muted">Prosimo, vnesite naslednje podatke:</p>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="custom-card shadow-sm">
                    <form id="orderForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small mb-1">Ime</label>
                                <input type="text" class="form-control" placeholder="Ime">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small mb-1">Priimek</label>
                                <input type="text" class="form-control" placeholder="Priimek">
                            </div>
                            <div class="col-12">
                                <label class="form-label small mb-1">E-pošta</label>
                                <input type="email" class="form-control" placeholder="E-pošta">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label small mb-1">Hišna številka</label>
                                <input type="text" class="form-control" placeholder="Ulica in št.">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small mb-1">Telefon</label>
                                <input type="text" class="form-control" placeholder="Tel.">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label small mb-1">Izdelek</label>
                                <input type="text" class="form-control" placeholder="Naziv izdelka">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small mb-1">Količina</label>
                                <input type="number" class="form-control" value="1">
                            </div>
                            <div class="col-12">
                                <label class="form-label small mb-1">Opomba</label>
                                <textarea class="form-control" rows="2" placeholder="Posebne želje..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-bar fixed-bottom d-flex justify-content-around align-items-center">
        <button type="submit" form="orderForm" class="btn btn-order">Pošlji naročilo</button>
        <button type="reset" form="orderForm" class="btn btn-order">Odstrani naročilo</button>
    </footer>
</body>
</html>
