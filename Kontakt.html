<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popa - Kontakt</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand" href="#"><img src="img/popa.png" alt="Popa"></a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Domov</a></li>
                    <li class="nav-item"><a class="nav-link" href="O_nas.html">O nas</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Izdelki</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Kontakt.html">Kontakt</a></li>
                    <li class="nav-item"><a class="nav-link" href="Narocilo.html">Naročilo</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <h1 class="fw-bold">Kontakt</h1>
        <hr class="mb-4" style="opacity: 0.1;">
        <p class="mb-4">Dosegljivi smo preko telefona in e-pošte ali preko obrazca.</p>

        <div class="custom-card">
            <div class="row g-5">
                <div class="col-md-5 d-flex flex-column justify-content-center">
                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-telephone text-primary fs-3 me-3"></i>
                        <span class="fs-5">+386 40 123 456</span>
                    </div>
                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-envelope text-primary fs-3 me-3"></i>
                        <span class="fs-5">info@popa.si</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <i class="bi bi-geo-alt text-primary fs-3 me-3"></i>
                        <span class="fs-5">Koroška cesta 39, Maribor</span>
                    </div>
                </div>
                <div class="col-md-7 border-start ps-md-5">
                    <form>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Ime</label>
                            <input type="text" class="form-control" placeholder="Ime">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Priimek</label>
                            <input type="text" class="form-control" placeholder="Priimek">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">E-pošta</label>
                            <input type="email" class="form-control" placeholder="E-pošta">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Sporočilo:</label>
                            <textarea class="form-control" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 text-white fw-bold">Pošlji sporočilo</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-bar fixed-bottom"></footer>
</body>
</html>
